<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=7">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="description" content="DOM Manipulation Counter Demo using JavaScript, HTML, and CSS.">
    <meta name="keywords" content="Counter,  Demo, JavaScript, HTML, CSS">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Counter-V1.0</title>
    <link rel="stylesheet" href="assets/css/counter.css">
</head>
<body>
    <div id="counter">
        <div id="counter-card">
            <div id="counter-details">
                <h3>COUNTER — V1.0 </h3>
                <hr>
                <p>
                    <span id="current-value-word">CURRENT VALUE</span> 
                    <br>
                    <span id="counter-value">0</span>
                </p>
            </div>
            <div id="counter-controls">
                <button id="increment-btn">+ INCREMENT </button>
                <button id="decrement-btn">- DECREMENT </button>
                <br>
                <button id="reset-btn">RESET TO ZERO</button>
            </div>
            <hr>
            <div id="steps-counter">
                 <p><span id="demo-line">DOM MANIPULATION DEMO</span>
                    <span id="ops-counter">ops: 0</span>
                </p>
            </div>  
        </div>
    </div>
    <script src="assets/js/counter.js"></script>
</body>
</html>
